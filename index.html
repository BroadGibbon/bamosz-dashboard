<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alappiac Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1>Alappiac Dashboard</h1>
      <span class="sub">BAMOSZ-alapok — piaci áttekintés</span>
    </header>

    <div class="toolbar">
      <input id="search" type="text" placeholder="Keresés alap vagy alapkezelő nevére…" autocomplete="off">
      <span id="summary" class="summary">Betöltés…</span>
    </div>

    <div class="filters">
      <label>Kategória<select id="f-category"></select></label>
      <label>Deviza<select id="f-currency"></select></label>
      <label>Kockázat<select id="f-risk"></select></label>
      <label>Alapkezelő<select id="f-manager"></select></label>
      <button id="reset" type="button">Szűrők törlése</button>
    </div>

    <section class="block">
      <div class="blockhead">
        <h2 class="sec">Top 20 alap</h2>
        <label class="rank">Rangsor: <select id="rank"></select></label>
      </div>
      <div class="tablewrap">
        <table id="funds" class="grid"><colgroup id="funds-cg"></colgroup>
          <thead id="funds-h"></thead><tbody id="funds-b"></tbody></table>
      </div>
    </section>

    <section class="block">
      <div class="blockhead"><h2 class="sec">Top 20 alapkezelő</h2></div>
      <div class="tablewrap">
        <table id="mgrs" class="grid"><colgroup id="mgrs-cg"></colgroup>
          <thead id="mgrs-h"></thead><tbody id="mgrs-b"></tbody></table>
      </div>
    </section>

    <label class="illiqrow">
      <input type="checkbox" id="illiq"> Illikvid / megszűnt alapok megjelenítése is
    </label>

    <p class="foot">Az oszlopok szélessége a fejléc jobb szélénél húzva átméretezhető (a hosszú nevek „…"-tal rövidülnek).</p>
  </div>

  <script src="config.js"></script>
  <script src="common.js"></script>
  <script src="market.js"></script>
</body>
</html>
